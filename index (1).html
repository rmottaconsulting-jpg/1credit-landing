<!-- NOTIFICAÇÕES DE PROVA SOCIAL -->
<style>
.social-notification {
  position: fixed;
  bottom: 30px;
  left: 30px;
  background: linear-gradient(135deg, #141414, #1A1A1A);
  border: 1px solid #D4AF37;
  border-radius: 12px;
  padding: 16px 20px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(212, 175, 55, 0.2);
  display: flex;
  align-items: center;
  gap: 14px;
  min-width: 320px;
  z-index: 9999;
  animation: slideInLeft 0.5s ease, slideOutLeft 0.5s ease 4.5s;
  opacity: 0;
}

.social-notification.show {
  animation: slideInLeft 0.5s ease forwards;
}

.social-notification.hide {
  animation: slideOutLeft 0.5s ease forwards;
}

@keyframes slideInLeft {
  from {
    transform: translateX(-400px);
    opacity: 0;
  }
  to {
    transform: translateX(0);
    opacity: 1;
  }
}

@keyframes slideOutLeft {
  from {
    transform: translateX(0);
    opacity: 1;
  }
  to {
    transform: translateX(-400px);
    opacity: 0;
  }
}

.social-notification-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, #D4AF37, #F4D03F);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
}

.social-notification-content {
  flex: 1;
}

.social-notification-name {
  color: #FFFFFF;
  font-weight: 700;
  font-size: 15px;
  margin-bottom: 4px;
}

.social-notification-action {
  color: #B8B8B8;
  font-size: 13px;
}

.social-notification-time {
  color: #D4AF37;
  font-size: 12px;
  font-weight: 600;
  margin-top: 2px;
}

/* Responsive */
@media (max-width: 768px) {
  .social-notification {
    bottom: 20px;
    left: 20px;
    right: 20px;
    min-width: auto;
  }
}
</style>

<div id="notification-container"></div>

<script>
// Lista de nomes reais brasileiros
const nomes = [
  'Carlos Silva', 'Maria Santos', 'João Oliveira', 'Ana Costa', 
  'Pedro Souza', 'Juliana Lima', 'Rafael Pereira', 'Camila Rodrigues',
  'Lucas Almeida', 'Fernanda Martins', 'Bruno Ferreira', 'Patricia Ribeiro',
  'Gustavo Carvalho', 'Mariana Gomes', 'Felipe Barbosa', 'Beatriz Dias',
  'Thiago Monteiro', 'Larissa Araújo', 'Rodrigo Castro', 'Amanda Rocha',
  'Daniel Fernandes', 'Gabriela Cardoso', 'Marcelo Mendes', 'Aline Nunes',
  'André Teixeira', 'Natália Pinto', 'Vitor Correia', 'Renata Azevedo',
  'Eduardo Ramos', 'Isabela Moreira', 'Leonardo Vieira', 'Caroline Freitas',
  'Ricardo Duarte', 'Jéssica Cavalcanti', 'Henrique Campos', 'Tatiana Melo',
  'Marcio Reis', 'Vanessa Nascimento', 'Paulo Lopes', 'Cristina Borges'
];

// Tipos de diagnóstico
const planos = [
  'Diagnóstico Básico',
  'Consultoria Estratégica',
  'Acompanhamento Premium'
];

// Cidades brasileiras
const cidades = [
  'São Paulo - SP', 'Rio de Janeiro - RJ', 'Belo Horizonte - MG', 
  'Brasília - DF', 'Curitiba - PR', 'Porto Alegre - RS',
  'Salvador - BA', 'Fortaleza - CE', 'Recife - PE', 
  'Manaus - AM', 'Goiânia - GO', 'Campinas - SP',
  'Guarulhos - SP', 'Natal - RN', 'Florianópolis - SC'
];

function criarNotificacao() {
  const container = document.getElementById('notification-container');
  
  // Remove notificação anterior se existir
  const notificacaoAntiga = container.querySelector('.social-notification');
  if (notificacaoAntiga) {
    notificacaoAntiga.remove();
  }

  // Seleciona dados aleatórios
  const nome = nomes[Math.floor(Math.random() * nomes.length)];
  const plano = planos[Math.floor(Math.random() * planos.length)];
  const cidade = cidades[Math.floor(Math.random() * cidades.length)];
  
  // Gera tempo aleatório (1-15 minutos atrás)
  const minutosAtras = Math.floor(Math.random() * 15) + 1;
  const tempoTexto = minutosAtras === 1 ? 'Agora mesmo' : `Há ${minutosAtras} minutos`;

  // Cria a notificação
  const notificacao = document.createElement('div');
  notificacao.className = 'social-notification show';
  notificacao.innerHTML = `
    <div class="social-notification-icon">✓</div>
    <div class="social-notification-content">
      <div class="social-notification-name">${nome}</div>
      <div class="social-notification-action">Adquiriu: ${plano}</div>
      <div class="social-notification-time">${tempoTexto} • ${cidade}</div>
    </div>
  `;

  container.appendChild(notificacao);

  // Remove após 5 segundos
  setTimeout(() => {
    notificacao.classList.add('hide');
    setTimeout(() => notificacao.remove(), 500);
  }, 5000);
}

// Primeira notificação após 5 segundos
setTimeout(criarNotificacao, 5000);

// Notificações subsequentes a cada 15-30 segundos
setInterval(() => {
  const intervaloAleatorio = Math.floor(Math.random() * 15000) + 15000; // 15-30s
  setTimeout(criarNotificacao, intervaloAleatorio);
}, 30000);
</script>
